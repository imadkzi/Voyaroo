services:
  db:
    image: postgres:17
    container_name: voyaroo-postgres
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: voyaroo
      POSTGRES_PASSWORD: voyaroo
      POSTGRES_DB: voyaroo
    volumes:
      - voyaroo_pgdata:/var/lib/postgresql/data

volumes:
  voyaroo_pgdata:

